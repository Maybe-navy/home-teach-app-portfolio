{% extends "base.html" %}
{% block title %}報酬カテゴリ編集{% endblock %}
{% block content %}

<h1 class="h5 mb-3">報酬カテゴリ編集：{{ cat.get_category_display }}</h1>

<div class="card">
  <div class="card-body">
    <form method="post" class="vstack gap-3">
      {% csrf_token %}
      {% include "_form_errors.html" %}
      <div>
        <label class="form-label">{{ form.category.label }}</label>
        {{ form.category }}
      </div>
      <div>
        <label class="form-label">{{ form.reward_per_class.label }}</label>
        {{ form.reward_per_class }}
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">保存</button>
        <a class="btn btn-outline-secondary" href="{% url 'admin_portal:reward_category_list' %}">キャンセル</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
