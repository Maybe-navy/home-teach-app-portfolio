{% extends "base.html" %}
{% block title %}報酬カテゴリ一覧{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h5 mb-0">報酬カテゴリ一覧</h1>
  <a class="btn btn-primary" href="{% url 'admin_portal:reward_category_create' %}">規定金額を新規作成</a>
</div>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-striped table-hover mb-0">
      <thead>
        <tr><th>区分</th><th>金額</th><th style="width:120px">操作</th></tr>
      </thead>
      <tbody>
        {% for c in cats %}
          <tr>
            <td>{{ c.get_category_display }}</td>
            <td>{{ c.reward_per_class|default:"（自由設定）" }}</td>
            <td>
              <a class="btn btn-sm btn-outline-secondary" href="{% url 'admin_portal:reward_category_edit' c.id %}">編集</a>
            </td>
          </tr>
        {% empty %}
          <tr><td colspan="3" class="text-muted">該当なし</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="mt-3">
  <a class="btn btn-link px-0" href="{% url 'admin_portal:reward_settings_top' %}">← 報酬設定トップ</a>
</div>

{% endblock %}
