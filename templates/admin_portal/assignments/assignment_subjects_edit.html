{% extends "base.html" %}
{% block title %}担当科目の編集{% endblock %}
{% block content %}
<div class="card"><div class="card-body">
  <h1 class="h5 mb-3">担当科目の編集</h1>
  <p class="text-muted">講師: <strong>{{ assignment.teacher.name }}</strong> / 生徒: <strong>{{ assignment.student.name }}</strong></p>
  <form method="post">{% csrf_token %}
    <div class="row row-cols-2 row-cols-md-3 g-2 mb-3">
      {% for s in subjects %}
      <div class="col">
        <label class="form-check">
          <input class="form-check-input" type="checkbox" name="subjects" value="{{ s.id }}" {% if s.id in selected %}checked{% endif %}>
          <span class="form-check-label">{{ s.name }}</span>
        </label>
      </div>
      {% endfor %}
    </div>
    <button class="btn btn-primary">保存</button>
    <a class="btn btn-link" href="{% url 'admin_portal:assignment_list' %}">戻る</a>
  </form>
</div></div>
{% endblock %}
