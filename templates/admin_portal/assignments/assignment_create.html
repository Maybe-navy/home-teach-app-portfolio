{% extends "base.html" %}
{% block title %}担当割当の作成{% endblock %}
{% block content %}
<div class="card"><div class="card-body">
  <h1 class="h5 mb-3">担当割当の作成</h1>
  <form method="post">{% csrf_token %}
    <div class="mb-3">{{ form.teacher.label_tag }} {{ form.teacher }}</div>
    <div class="mb-3">{{ form.student.label_tag }} {{ form.student }}</div>
    <div class="mb-3">
      <label class="form-label">担当科目（複数可）</label>
      {{ form.subjects }}
    </div>
    <button class="btn btn-primary">登録</button>
    <a class="btn btn-link" href="{% url 'admin_portal:assignment_list' %}">戻る</a>
  </form>
</div></div>
{% endblock %}
